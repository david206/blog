<!DOCTYPE html>
<html lang="{{ .Language.Locale | default .Site.Language.Locale }}" dir="{{ .Language.Direction | default "ltr" }}">
    {{- partial "head.html" . -}}
    <body a="{{ $.Site.Params.theme_config.appearance | default "auto" }}">
        <main class="page-content" aria-label="Content">
            <div class="w">
                {{- if not .IsHome }}{{ partial "language_switch.html" . }}{{ end -}}
                {{- block "main" . }}{{- end }}
            </div>
        </main>
    </body>
</html>
